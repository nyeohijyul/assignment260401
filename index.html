<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>미니 리스트 만들기</title>
    <style>
      button { margin-left: 10px; }
      input { margin-left: 40px; }
      .done {
        color: grey;
        text-decoration: line-through grey 1px;
      }
    </style>
  </head>
  <body>
    <button id="all">전체 할 일 보기</button>
    <button id="done">완료 할 일 보기</button>
    <button id="inprogress">미완료 할 일 보기</button>
    <ul id="list">
      <!-- <li>공부하기<button>✖</button></li> -->
    </ul>
    <input id="tasktextInput" type="text" placeholder="할 일을 입력하세요." />
    <button id="addBtn">✔</button>
    <button id="resetBtn">⭮</button>
    <script src="script.js"></script>
  </body>
</html>
